name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run check:commits
      - run: bun run check:deps
      - run: bun run check:files
      - run: bun run check:web-structure
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
      - name: Install PTY smoke helper
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y expect
      - run: bun run smoke:tui
      - run: bun run build
      - name: Install Agent Browser
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm install -g agent-browser@0.27.0
          agent-browser install --with-deps
      - run: bun run smoke:web-ui
        if: matrix.os == 'ubuntu-latest'
      - run: bun run smoke:docs-ui
        if: matrix.os == 'ubuntu-latest'
      - run: bun run smoke:package
      - run: bun run build:docs
      - run: bun run build:binary
      - run: bun run smoke:binary
      - run: bun run smoke:pi-rpc
        if: matrix.os != 'windows-latest'
