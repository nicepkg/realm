name: Docs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    paths:
      - "apps/docs/**"
      - "docs/**"
      - "packages/design-tokens/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "docs/**"
      - "packages/design-tokens/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run build:docs
      - name: Install Agent Browser
        run: |
          npm install -g agent-browser@0.27.0
          agent-browser install --with-deps
      - run: bun run smoke:docs-ui
      - uses: actions/upload-artifact@v5
        with:
          name: realm-docs
          path: apps/docs/dist

  deploy:
    name: Deploy docs to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: realm-docs
          path: apps/docs/dist
      - name: Skip deployment when Cloudflare secrets are unavailable
        if: env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == ''
        run: echo "Cloudflare secrets are not configured; docs build artifact is ready."
      - name: Deploy
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/docs/dist --project-name realm-docs --branch main
