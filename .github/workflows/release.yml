name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  binaries:
    name: Build ${{ matrix.os }} binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: realm-linux-x64
            binary: realm
            release_binary: realm-linux-x64
          - os: macos-latest
            artifact: realm-macos-arm64
            binary: realm
            release_binary: realm-macos-arm64
          - os: windows-latest
            artifact: realm-windows-x64
            binary: realm.exe
            release_binary: realm-windows-x64.exe
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - run: bun run build:binary
      - run: mkdir release
        shell: bash
      - run: cp "dist/bin/${{ matrix.binary }}" "release/${{ matrix.release_binary }}"
        shell: bash
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: release/*

  github-release:
    name: Publish GitHub release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
