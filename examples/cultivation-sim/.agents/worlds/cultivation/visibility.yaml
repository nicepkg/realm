version: 1
roles:
  canRead:
    - /publicState
    - /privateState/roles/{roleId}
    - /derivedState/dangerLevel
    - /metaState/roles/{roleId}
  cannotRead:
    - /hiddenState
    - /privateState/roles/{otherRoleId}
owner:
  canRead:
    - /
  canPatch:
    - /publicState
    - /privateState
    - /derivedState
god:
  canRead:
    - /
  canPatch:
    - /
